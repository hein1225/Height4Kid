<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地存储测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        button {
            margin: 5px;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0069d9;
        }
    </style>
</head>
<body>
    <h1>本地存储测试</h1>
    
    <h2>测试结果</h2>
    <div id="test-results"></div>
    
    <h2>操作</h2>
    <button onclick="testLocalStorage()">测试本地存储</button>
    <button onclick="clearLocalStorage()">清除本地存储</button>
    <button onclick="setTestData()">设置测试数据</button>
    <button onclick="getTestData()">获取测试数据</button>
    
    <h2>当前本地存储内容</h2>
    <div id="localstorage-content"></div>
    
    <script>
        function addResult(message, isSuccess) {
            const resultsDiv = document.getElementById('test-results');
            const div = document.createElement('div');
            div.className = `test-result ${isSuccess ? 'success' : 'error'}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
        }
        
        function testLocalStorage() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '';
            
            try {
                // 测试本地存储是否可用
                localStorage.setItem('test', 'test');
                const value = localStorage.getItem('test');
                localStorage.removeItem('test');
                
                if (value === 'test') {
                    addResult('本地存储访问成功', true);
                } else {
                    addResult('本地存储访问失败：获取值不匹配', false);
                }
            } catch (error) {
                addResult(`本地存储访问错误：${error.message}`, false);
            }
            
            // 测试sessionStorage
            try {
                sessionStorage.setItem('test', 'test');
                const value = sessionStorage.getItem('test');
                sessionStorage.removeItem('test');
                
                if (value === 'test') {
                    addResult('Session存储访问成功', true);
                } else {
                    addResult('Session存储访问失败：获取值不匹配', false);
                }
            } catch (error) {
                addResult(`Session存储访问错误：${error.message}`, false);
            }
            
            // 显示当前本地存储内容
            displayLocalStorageContent();
        }
        
        function clearLocalStorage() {
            try {
                localStorage.clear();
                addResult('本地存储已清除', true);
                displayLocalStorageContent();
            } catch (error) {
                addResult(`清除本地存储错误：${error.message}`, false);
            }
        }
        
        function setTestData() {
            try {
                const testData = {
                    adminSettings: JSON.stringify({ adminPath: '/admin' }),
                    token: 'test-token',
                    user: JSON.stringify({ role: 'admin' })
                };
                
                for (const [key, value] of Object.entries(testData)) {
                    localStorage.setItem(key, value);
                }
                
                addResult('测试数据已设置', true);
                displayLocalStorageContent();
            } catch (error) {
                addResult(`设置测试数据错误：${error.message}`, false);
            }
        }
        
        function getTestData() {
            try {
                const testData = {
                    adminSettings: localStorage.getItem('adminSettings'),
                    token: localStorage.getItem('token'),
                    user: localStorage.getItem('user')
                };
                
                addResult('测试数据获取成功', true);
                for (const [key, value] of Object.entries(testData)) {
                    addResult(`${key}: ${value}`, true);
                }
            } catch (error) {
                addResult(`获取测试数据错误：${error.message}`, false);
            }
        }
        
        function displayLocalStorageContent() {
            const contentDiv = document.getElementById('localstorage-content');
            try {
                const keys = Object.keys(localStorage);
                if (keys.length === 0) {
                    contentDiv.textContent = '本地存储为空';
                } else {
                    let content = '';
                    keys.forEach(key => {
                        content += `${key}: ${localStorage.getItem(key)}\n`;
                    });
                    contentDiv.textContent = content;
                }
            } catch (error) {
                contentDiv.textContent = `无法访问本地存储：${error.message}`;
            }
        }
        
        // 页面加载时自动测试
        window.onload = function() {
            testLocalStorage();
        };
    </script>
</body>
</html>
